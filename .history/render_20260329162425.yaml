services:
  - type: web
    name: kinetic
    env: node
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        value: YOUR_GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
        value: YOUR_GOOGLE_CLIENT_SECRET
      - key: MONGODB_URI
        value: YOUR_MONGODB_URI
      - key: APP_URL
        value: https://mail-refinery.web.app
      - key: SERVER_URL
        value: https://mail-curator.onrender.com
